<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIGCASH - Orçamentos de Shows</title>
    <meta name="description" content="Aplicativo profissional para cálculo rápido e automatizado de orçamentos de shows, rateios e exportação de proposta em PDF." />
    <meta name="theme-color" content="#030712" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.jpg" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("[PWA] Service Worker registrado com sucesso:", registration.scope);
            })
            .catch((error) => {
              console.log("[PWA] Falha ao registrar o Service Worker:", error);
            });
        });
      }
    </script>
  </body>
</html>
